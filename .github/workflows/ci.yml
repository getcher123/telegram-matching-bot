name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m ruff check app/ tests/
      - run: python -m mypy app/ --ignore-missing-imports
      - run: python -m pytest -q
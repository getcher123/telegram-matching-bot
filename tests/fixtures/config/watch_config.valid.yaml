rules:
  - id: "tv_50_plus_sale"
    title: "Продажа телевизора 50+ дюймов"
    enabled: true
    scope:
      chat_ids:
        - -1001111000001
        - -1001111000002
        - -1001111000003
    require:
      intent: "sale"
      category: "tv"
      diagonal_inches:
        gte: 50.0
    reject_if:
      intents:
        - "buy"
        - "service"
        - "unavailable"
      fake: true
      accessory_only: true
      part_only: true
    alert:
      severity: "normal"
      title: "Телевизор 50+ дюймов"

  - id: "macbook_m4_pro_sale"
    title: "Продажа MacBook с M4 Pro"
    enabled: true
    scope:
      chat_ids:
        - -1001111000001
        - -1001111000002
        - -1001111000003
    require:
      intent: "sale"
      category: "macbook"
      chip: "m4_pro"
    reject_if:
      intents:
        - "buy"
        - "service"
        - "unavailable"
      fake: true
      accessory_only: true
      part_only: true
      product_families:
        - "mac_mini"
        - "ipad"
    alert:
      severity: "high"
      title: "MacBook M4 Pro"

  - id: "airpods_pro_2_sale"
    title: "Продажа AirPods Pro 2"
    enabled: true
    scope:
      chat_ids:
        - -1001111000001
        - -1001111000002
        - -1001111000003
    require:
      intent: "sale"
      category: "airpods"
      line: "pro"
      generation: "gen2"
    reject_if:
      intents:
        - "buy"
        - "service"
        - "unavailable"
      fake: true
      accessory_only: true
      part_only: true
    alert:
      severity: "normal"
      title: "AirPods Pro 2"